type: task_block
title: Whisper
options:
  mode: request
  applet: ../../applets/main.oo.yaml
  function: whisper
inputs_def:
  - handle: wav_file
    serialize:
      serializer: json
      json_schema:
        type: string
  - handle: model
    serialize:
      serializer: json
      json_schema:
        type: string
        enum:
          - tiny
          - base
          - small
          - medium
  - handle: srt_folder
    serialize:
      serializer: json
      json_schema:
        type: string
        ui:widget: dir
  - handle: srt_file_name
    serialize:
      serializer: json
      json_schema:
        type: string
outputs_def:
  - handle: output_srt_path
    serialize:
      serializer: json
